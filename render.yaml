services:
  - type: web
    name: yoyo-backend
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SCRAPINGDOG_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: YOYO_CORS_ORIGINS
        value: "*"
